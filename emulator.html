<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emulation Station – Playing…</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Emulator-page specific layout ── */
    body { overflow-x: hidden; }

    .emulator-page {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: #000;
    }

    /* Top control bar */
    .emu-topbar {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .4rem .6rem;
      background: #04040d;
      border-bottom: 1px solid #1a1a35;
      flex-shrink: 0;
      flex-wrap: wrap;
      z-index: 10;
    }
    .emu-topbar .btn { padding: .35rem .7rem; font-size: .72rem; height: 32px; }
    .game-title {
      flex: 1;
      font-family: var(--font-hud);
      font-size: .8rem;
      font-weight: 600;
      text-align: center;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,212,255,.4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 60px;
    }
    .sys-badge {
      font-family: var(--font-hud);
      font-size: .62rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 20px;
      background: rgba(0,212,255,.12);
      border: 1px solid rgba(0,212,255,.3);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    /* Save/Load buttons disabled state */
    .btn[disabled] { opacity: .4; cursor: not-allowed; }
    .btn[disabled]:hover { opacity: .4; transform: none; }

    /* EmulatorJS container */
    #game-wrapper {
      flex: 1 1 auto;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: #000;
      min-height: 200px;
    }
    #game {
      width: 100%;
      max-width: 960px;
      background: #000;
    }
    #game > * { width: 100% !important; }
    #game canvas { display: block; max-width: 100%; }

    /* Virtual gamepad panel */
    .virtual-gamepad {
      flex-shrink: 0;
      background: #04040d;
      border-top: 1px solid #1a1a35;
      padding: .6rem .5rem .9rem;
      max-width: 960px;
      width: 100%;
      align-self: center;
    }

    .gp-shoulder-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: .5rem;
    }
    .gp-shoulder-group { display: flex; gap: .3rem; }

    .gp-main-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: .25rem;
    }

    /* D-pad */
    .dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
      grid-template-columns: 42px 42px 42px;
      grid-template-rows: 42px 42px 42px;
      gap: 2px;
    }
    .dpad-up    { grid-area: up; }
    .dpad-down  { grid-area: down; }
    .dpad-left  { grid-area: left; }
    .dpad-right { grid-area: right; }
    .dpad-center {
      grid-area: center;
      background: #12122a;
      border-radius: 3px;
      pointer-events: none;
    }

    /* Action button diamond */
    .action-diamond {
      display: grid;
      grid-template-areas:
        ". y ."
        "x . a"
        ". b .";
      grid-template-columns: 42px 42px 42px;
      grid-template-rows: 42px 42px 42px;
      gap: 2px;
    }
    .btn-y { grid-area: y; }
    .btn-x { grid-area: x; }
    .btn-a { grid-area: a; }
    .btn-b { grid-area: b; }

    .gp-center-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
    }
    .gp-meta-row { display: flex; gap: .35rem; }

    .gp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      outline: none;
      cursor: pointer;
      font-weight: 700;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: filter .08s, transform .08s, box-shadow .08s;
      position: relative;
    }
    .gp-btn:active, .gp-btn.pressed {
      transform: scale(.88);
      filter: brightness(1.4);
    }

    .dpad-btn {
      width: 42px; height: 42px;
      background: #181830;
      border-radius: 8px;
      color: #d0d0e8;
      font-size: 1.05rem;
      box-shadow: 0 3px 0 #090918, inset 0 1px 0 rgba(255,255,255,.04);
    }

    .shoulder-btn {
      height: 30px;
      padding: 0 .75rem;
      background: #141428;
      border-radius: 7px 7px 4px 4px;
      color: #7070a0;
      font-family: var(--font-hud);
      font-size: .64rem;
      letter-spacing: .05em;
      box-shadow: 0 4px 0 #080818;
    }

    .action-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      font-family: var(--font-hud);
      font-size: .7rem;
      color: #fff;
    }
    .btn-a { background: #1e88e5; box-shadow: 0 3px 0 #0d47a1; }
    .btn-b { background: #c0213e; box-shadow: 0 3px 0 #8a0e25; }
    .btn-x { background: #e07800; box-shadow: 0 3px 0 #995200; }
    .btn-y { background: #2ea84a; box-shadow: 0 3px 0 #175c28; }

    .meta-btn {
      padding: .25rem .6rem;
      height: 26px;
      background: #181830;
      border-radius: 20px;
      color: #7070a0;
      font-family: var(--font-hud);
      font-size: .58rem;
      letter-spacing: .06em;
      box-shadow: 0 2px 0 #090918;
    }

    #toggleGamepad {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--accent2);
      color: #fff;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(123,47,255,.55);
      touch-action: none;
      transition: background .2s, box-shadow .2s;
    }
    #toggleGamepad:hover { background: #6320cc; box-shadow: 0 4px 24px rgba(123,47,255,.8); }

    .kb-hint {
      text-align: center;
      font-family: var(--font-mono);
      font-size: .68rem;
      color: #404060;
      padding: .3rem 0 .5rem;
      border-top: 1px solid #1a1a2e;
      margin-top: .5rem;
    }
  </style>
</head>
<body class="emulator-page">

<!-- ══ Top bar ══════════════════════════════════════════════════════════ -->
<nav class="emu-topbar" aria-label="Emulator controls">
  <a href="index.html" class="btn btn-secondary" title="Back to launcher">← Back</a>
  <span class="game-title" id="gameTitle">Loading…</span>
  <span class="sys-badge" id="sysBadge"></span>
  <button class="btn btn-secondary" id="btnFullscreen" title="Fullscreen (F)">⛶</button>
  <button class="btn btn-secondary" id="btnSave" title="Save State" disabled>💾</button>
  <button class="btn btn-secondary" id="btnLoad" title="Load State" disabled>📂</button>
</nav>

<!-- ══ Game Screen ═══════════════════════════════════════════════════════ -->
<div id="game-wrapper">
  <div id="game"></div>
</div>

<!-- ══ Virtual Gamepad (BELOW the screen) ════════════════════════════════ -->
<div class="virtual-gamepad" id="virtualGamepad" aria-label="Virtual game controller">

  <!-- Shoulder buttons row -->
  <div class="gp-shoulder-row">
    <div class="gp-shoulder-group">
      <button class="gp-btn shoulder-btn" data-button="l1" aria-label="L1">L1</button>
      <button class="gp-btn shoulder-btn" data-button="l2" aria-label="L2">L2</button>
    </div>
    <div class="gp-shoulder-group">
      <button class="gp-btn shoulder-btn" data-button="r1" aria-label="R1">R1</button>
      <button class="gp-btn shoulder-btn" data-button="r2" aria-label="R2">R2</button>
    </div>
  </div>

  <!-- Main row: D-pad | meta | action diamond -->
  <div class="gp-main-row">

    <!-- D-pad -->
    <div class="dpad" aria-label="Directional pad">
      <button class="gp-btn dpad-btn dpad-up"    data-button="up"    aria-label="Up">▲</button>
      <button class="gp-btn dpad-btn dpad-left"  data-button="left"  aria-label="Left">◀</button>
      <div class="dpad-center" aria-hidden="true"></div>
      <button class="gp-btn dpad-btn dpad-right" data-button="right" aria-label="Right">▶</button>
      <button class="gp-btn dpad-btn dpad-down"  data-button="down"  aria-label="Down">▼</button>
    </div>

    <!-- Select / Start -->
    <div class="gp-center-group">
      <div class="gp-meta-row">
        <button class="gp-btn meta-btn" data-button="select" aria-label="Select">SELECT</button>
        <button class="gp-btn meta-btn" data-button="start"  aria-label="Start">START</button>
      </div>
    </div>

    <!-- Action buttons diamond -->
    <div class="action-diamond" aria-label="Action buttons">
      <button class="gp-btn action-btn btn-y" data-button="y" aria-label="Y button">Y</button>
      <button class="gp-btn action-btn btn-x" data-button="x" aria-label="X button">X</button>
      <button class="gp-btn action-btn btn-a" data-button="a" aria-label="A button">A</button>
      <button class="gp-btn action-btn btn-b" data-button="b" aria-label="B button">B</button>
    </div>

  </div><!-- /.gp-main-row -->

  <div class="kb-hint">
    ⌨ Arrows = D-pad &nbsp;|&nbsp; Z=B &nbsp; X=A &nbsp; A=Y &nbsp; S=X &nbsp;
    Enter=Start &nbsp; Shift=Select &nbsp; Q=L1 &nbsp; W=R1
  </div>

</div><!-- /#virtualGamepad -->

<!-- ══ Game Genie Panel ══════════════════════════════════════════════════ -->
<div class="genie-panel" id="geniePanel" aria-label="Game Genie AI Panel">
  <div class="genie-header" id="genieHeader" role="button" tabindex="0" aria-expanded="true">
    <h3>🧞 Game Genie — Points · Coins · Levels</h3>
    <span class="genie-toggle-icon">▾</span>
  </div>
  <div class="genie-body" id="genieBody">

    <!-- Stats row -->
    <div class="genie-stats-row">
      <div class="genie-stat">
        <span class="genie-stat-icon">⭐</span>
        <span class="genie-stat-val" id="geniePoints">0</span>
        <span class="genie-stat-lbl">Points</span>
      </div>
      <div class="genie-stat">
        <span class="genie-stat-icon">🪙</span>
        <span class="genie-stat-val" id="genieCoins">0</span>
        <span class="genie-stat-lbl">Coins</span>
      </div>
      <div class="genie-stat">
        <span class="genie-stat-icon">🏆</span>
        <span class="genie-stat-val" id="genieLevel">1</span>
        <span class="genie-stat-lbl">Level</span>
      </div>
      <div class="genie-xp-bar-wrap">
        <div class="genie-xp-label">
          <span>XP</span>
          <span id="genieXPLabel">0 / 100</span>
        </div>
        <div class="genie-xp-bar">
          <div class="genie-xp-fill" id="genieXPBar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Cheat code input -->
    <div class="genie-cheat-row">
      <input type="text" id="cheatInput" placeholder="ENTER CHEAT CODE" maxlength="32"
             aria-label="Cheat code input" autocomplete="off" />
      <button class="btn btn-genie" onclick="applyGenieCheat()">Apply 🧞</button>
      <button class="btn btn-secondary" onclick="awardGeniePts()" title="+10 pts per click">+10 pts</button>
    </div>

    <!-- Level unlock -->
    <div class="genie-level-row">
      <input type="text" id="levelInput" placeholder="New level name…" maxlength="40"
             aria-label="New level name" autocomplete="off" />
      <button class="btn btn-secondary" onclick="createGenieLevel()">✨ Unlock Level</button>
    </div>
    <div class="genie-unlocked-levels" id="genieUnlockedLevels"></div>

  </div><!-- /.genie-body -->
</div><!-- /#geniePanel -->

<!-- ══ Gamepad toggle FAB ═════════════════════════════════════════════════ -->
<button id="toggleGamepad" title="Toggle gamepad" aria-label="Toggle virtual gamepad">🎮</button>

<!-- ══ Toast ══════════════════════════════════════════════════════════════ -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ══ Scripts ══════════════════════════════════════════════════════════ -->
<script src="app.js"></script>
<script>
(function () {
  const params = getQueryParams();
  const core   = params.core;
  const romUrl = params.rom;
  const name   = params.name || 'Game';
  const sysId  = params.system;

  /* ── Guard: must have core and ROM ── */
  if (!core || !romUrl) {
    document.getElementById('gameTitle').textContent = 'No ROM specified';
    document.getElementById('game-wrapper').innerHTML =
      '<div style="color:#ff4444;padding:2rem;text-align:center;font-family:var(--font-mono)">' +
      '⚠️ No ROM URL or system core provided.<br><br>' +
      '<a href="index.html" style="color:var(--accent)">← Go back to the launcher</a></div>';
    document.getElementById('virtualGamepad').style.display = 'none';
    document.getElementById('toggleGamepad').style.display  = 'none';
    document.getElementById('geniePanel').style.display     = 'none';
    return;
  }

  /* ── Display game title and system badge ── */
  document.title = name + ' – Emulation Station';
  document.getElementById('gameTitle').textContent = name;

  const sys   = sysId ? getSystem(sysId) : null;
  const badge = document.getElementById('sysBadge');
  if (sys) badge.textContent = sys.name;

  /* ── Save to recent list ── */
  saveRecentROM({ name, core, rom: romUrl, sysId: sysId || '', ts: Date.now() });

  /* ── EmulatorJS configuration ────────────────────────────────────────── */
  window.EJS_player        = '#game';
  window.EJS_core          = core;
  window.EJS_gameUrl       = romUrl;
  window.EJS_pathtodata    = 'https://cdn.emulatorjs.org/stable/data/';
  window.EJS_startOnLoaded = true;
  window.EJS_VirtualGamepad   = false;
  window.EJS_color            = '#00d4ff';
  window.EJS_backgroundColor  = '#000000';

  window.EJS_Buttons = {
    playPause:    true,
    restart:      true,
    mute:         true,
    settings:     true,
    fullscreen:   true,
    save:         true,
    load:         true,
    gamepad:      false,
    cheat:        false,
    volume:       true,
    saveSate:     true,   // EmulatorJS uses this misspelling; kept for API compatibility
    saveState:    true,
    loadState:    true,
    screenRecord: false,
    screenshot:   false,
    cacheManager: false,
  };

  /* ── Callback: game started ── */
  window.EJS_onGameStart = function () {
    initVirtualGamepad();
    enableSaveLoad();
    showToast('🎮 Game started! Enjoy.');
    awardPlayer(50, 5); // reward for starting a game
    refreshGenieUI();
  };

  window.EJS_onLoadState = function () { showToast('💾 State loaded.'); };
  window.EJS_onSaveState = function () { showToast('💾 State saved.'); awardPlayer(10, 1); refreshGenieUI(); };

  /* ── Enable Save/Load buttons once emulator is ready ── */
  function enableSaveLoad() {
    document.getElementById('btnSave').removeAttribute('disabled');
    document.getElementById('btnLoad').removeAttribute('disabled');
  }

  /* ── Poll for emulator readiness (fallback if EJS_onGameStart doesn't fire) ── */
  waitForEmulator(
    function () { enableSaveLoad(); },
    function () { /* timed out — leave buttons disabled */ }
  );

  /* ── Inject EmulatorJS script dynamically ── */
  const ejsScript   = document.createElement('script');
  ejsScript.src     = 'https://cdn.emulatorjs.org/stable/data/emulator.min.js';
  ejsScript.async   = false;
  ejsScript.onerror = function () {
    document.getElementById('game-wrapper').innerHTML =
      '<div style="color:#ff4444;padding:2rem;text-align:center;font-family:var(--font-mono)">' +
      '⚠️ Failed to load EmulatorJS. Check your internet connection and try again.<br><br>' +
      '<a href="index.html" style="color:var(--accent)">← Back to launcher</a></div>';
  };
  document.head.appendChild(ejsScript);

  /* ── Fullscreen ── */
  document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);
  document.addEventListener('keydown', e => { if (e.key === 'f' || e.key === 'F') toggleFullscreen(); });

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.getElementById('game-wrapper').requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  /* ── Save / Load state via EmulatorJS API ── */
  document.getElementById('btnSave').addEventListener('click', () => {
    if (window.EJS_emulator) {
      window.EJS_emulator.saveState();
    } else {
      showToast('⚠️ Emulator not ready yet — wait for the game to start.');
    }
  });
  document.getElementById('btnLoad').addEventListener('click', () => {
    if (window.EJS_emulator) {
      window.EJS_emulator.loadState();
    } else {
      showToast('⚠️ Emulator not ready yet — wait for the game to start.');
    }
  });

  /* ── Toggle virtual gamepad ── */
  const gamepadEl   = document.getElementById('virtualGamepad');
  const toggleBtn   = document.getElementById('toggleGamepad');
  let gamepadVisible = true;

  if (window.matchMedia('(min-width: 900px)').matches) {
    gamepadEl.style.display = 'none';
    gamepadVisible = false;
  }

  toggleBtn.addEventListener('click', () => {
    gamepadVisible = !gamepadVisible;
    gamepadEl.style.display = gamepadVisible ? '' : 'none';
    toggleBtn.title = gamepadVisible ? 'Hide gamepad' : 'Show gamepad';
    if (gamepadVisible) initVirtualGamepad();
  });

  /* ── Game Genie Panel ── */
  function refreshGenieUI() {
    const state = loadGenieState();
    document.getElementById('geniePoints').textContent = state.points.toLocaleString();
    document.getElementById('genieCoins').textContent  = state.coins.toLocaleString();
    document.getElementById('genieLevel').textContent  = state.level;

    const xpPerLevel   = XP_PER_LEVEL;
    const xpInLevel    = state.xp % xpPerLevel;
    document.getElementById('genieXPBar').style.width = (xpInLevel) + '%';
    document.getElementById('genieXPLabel').textContent = `${xpInLevel} / ${xpPerLevel}`;

    /* Render unlocked level badges */
    const container = document.getElementById('genieUnlockedLevels');
    container.innerHTML = '';
    state.unlockedLevels.forEach(lvl => {
      const badge = document.createElement('span');
      badge.className = 'genie-level-badge';
      badge.textContent = formatLevelLabel(lvl);
      container.appendChild(badge);
    });
  }

  /** Format a level identifier for display in a badge. */
  function formatLevelLabel(lvl) {
    if (typeof lvl === 'number') return `Lv ${lvl}`;
    return lvl.replace('custom_', '').replace(/_/g, ' ');
  }

  window.applyGenieCheat = function () {
    const input = document.getElementById('cheatInput');
    const code  = input.value.trim();
    if (!code) { showToast('⚠️ Enter a cheat code first.'); return; }
    const result = applyCheatCode(code);
    showToast(result.msg, 4000);
    input.value = '';
    refreshGenieUI();
  };

  window.awardGeniePts = function () {
    awardPlayer(10, 1);
    refreshGenieUI();
    showToast('⭐ +10 pts, +1 coin');
  };

  window.createGenieLevel = function () {
    const input = document.getElementById('levelInput');
    const lName = input.value.trim();
    if (!lName) { showToast('⚠️ Enter a level name first.'); return; }
    unlockCustomLevel(lName);
    input.value = '';
    refreshGenieUI();
  };

  /* Genie panel toggle */
  const genieHeader = document.getElementById('genieHeader');
  const genieBody   = document.getElementById('genieBody');
  genieHeader.addEventListener('click', () => {
    const collapsed = genieHeader.classList.toggle('collapsed');
    genieBody.classList.toggle('collapsed', collapsed);
    genieHeader.setAttribute('aria-expanded', String(!collapsed));
  });
  genieHeader.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); genieHeader.click(); }
  });

  /* Cheat input – Enter key */
  document.getElementById('cheatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyGenieCheat();
  });

  /* Initial render */
  refreshGenieUI();

})();
</script>
</body>
</html>
